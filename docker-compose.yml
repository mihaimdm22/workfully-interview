services:
  postgres:
    image: postgres:17-alpine
    container_name: workfully-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workfully
      POSTGRES_PASSWORD: workfully
      POSTGRES_DB: workfully
    volumes:
      - workfully-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workfully -d workfully"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  workfully-pgdata:
