name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concrete description.
      placeholder: "When I /screen and paste a JD, the bot replies twice."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /
        2. Type "/screen"
        3. Paste JD from fixtures/job-description.pdf
        4. Observe two bot replies
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit / version
      placeholder: e.g. main @ abc123 or v0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
